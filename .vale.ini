# Vale configuration for snap-css
# Minimal, self-contained. Vale ships with built-in rules.

# Minimum alert level to display.
# Values: suggestion, warning, error
MinAlertLevel = warning

# Path to styles directory (can be overridden by Packages below)
StylesPath = .vale/styles

# Download and install styles from the official Vale repository.
# Vale sync is run automatically on first use.
Packages = https://github.com/get-vale/styles/releases/download/v0.0.35/styles.zip

# Format associations — treat .mdx as .md for linting purposes
[formats]
mdx = md

# Global settings applied to all files
[*]
BasedOnStyles =

# Markdown files: Vale base prose rules
[*.md]
BasedOnStyles = Vale

# Go files: no prose rules — gofmt/staticcheck are authoritative
[*.go]
BasedOnStyles =

# JSON schema files: no linting
[*.json]
BasedOnStyles =
